<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Car - Raycast Sensors</title>
</head>
<body>
    <canvas width="800" height="800" id="canvas" style="border:1px solid #ccc"></canvas>
    <div>
        <label>alpha1 (left wheel angular accel): <input id="alpha1" value="0"></label>
        <label>alpha2 (right wheel angular accel): <input id="alpha2" value="0"></label>
    </div>
    <pre id="readout" style="font-family:monospace"></pre>
    <script>
        const alpha1Input = document.getElementById('alpha1');
        const alpha2Input = document.getElementById('alpha2');
        const readout = document.getElementById('readout');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        const dt = 1 / 60;

        // Collision tuning. Frictionless => only the NORMAL velocity component
        // is affected; the tangential component is left untouched (the car slides
        // along the wall). RESTITUTION = 1 is a perfectly elastic bounce
        // (physics2.md Step 3), 0 means the car just stops against the wall.
        const RESTITUTION = 1;

        // The 8 sensor directions, as offsets (radians) from the car's heading.
        // Ordered clockwise from the front (theta is a clockwise angle on the
        // y-down screen). Labels are informational only.
        const SENSOR_DIRS = [
            { label: 'F',  off: 0 },
            { label: 'FR', off: Math.PI / 4 },
            { label: 'R',  off: Math.PI / 2 },
            { label: 'BR', off: 3 * Math.PI / 4 },
            { label: 'B',  off: Math.PI },
            { label: 'BL', off: 5 * Math.PI / 4 },
            { label: 'L',  off: 3 * Math.PI / 2 },
            { label: 'FL', off: 7 * Math.PI / 4 },
        ];

        const car = {
            states: {
                x: 400,
                y: 400,
                vx: 0,
                vy: 0,
                theta: 0,
                omega: 0,
                spin1: 0,   // left wheel angular velocity (starts driving forward)
                spin2: 0,   // right wheel angular velocity
            },
            consts: {
                W: 40,        // car body is a W x W square
                R: 10,        // wheel radius
                maxSight: 250, // raycast detection range (pixels)
            },
            colliding: false,
            sensors: [],  // filled each frame by raycast(): array of distances
        };

        // Obstacles: axis-aligned boxes (AABBs), immovable / infinite mass.
        const blocks = [
            { x: 340, y: 150, w: 120, h: 60 },
            { x: 150, y: 350, w: 60, h: 200 },
        ];

        // ---- Geometry helpers -------------------------------------------------

        // Four corners of the rotated car body (W x W square centered at x,y).
        // Standard 2D rotation in screen (y-down) coords: positive theta = clockwise.
        function getCarCorners(s, W) {
            const hw = W / 2;
            const c = Math.cos(s.theta);
            const sn = Math.sin(s.theta);
            const local = [[-hw, -hw], [hw, -hw], [hw, hw], [-hw, hw]];
            return local.map(([lx, ly]) => [
                s.x + lx * c - ly * sn,
                s.y + lx * sn + ly * c,
            ]);
        }

        function getBlockCorners(b) {
            return [
                [b.x, b.y],
                [b.x + b.w, b.y],
                [b.x + b.w, b.y + b.h],
                [b.x, b.y + b.h],
            ];
        }

        // Project a set of points onto a (unit) axis, return [min, max].
        function project(corners, axis) {
            let min = Infinity, max = -Infinity;
            for (const [px, py] of corners) {
                const p = px * axis[0] + py * axis[1];
                if (p < min) min = p;
                if (p > max) max = p;
            }
            return [min, max];
        }

        // ---- Raycasting -------------------------------------------------------

        // Ray vs axis-aligned box (slab method). Returns the distance from the
        // ray origin to the first intersection along direction (dx, dy) (a unit
        // vector), or null if the ray misses the box. dirX/dirY must be unit.
        function rayBox(ox, oy, dx, dy, b) {
            let tEnter = -Infinity;
            let tExit = Infinity;

            // X slab
            if (Math.abs(dx) < 1e-9) {
                if (ox < b.x || ox > b.x + b.w) return null; // parallel & outside
            } else {
                let t1 = (b.x - ox) / dx;
                let t2 = (b.x + b.w - ox) / dx;
                if (t1 > t2) [t1, t2] = [t2, t1];
                tEnter = Math.max(tEnter, t1);
                tExit = Math.min(tExit, t2);
            }

            // Y slab
            if (Math.abs(dy) < 1e-9) {
                if (oy < b.y || oy > b.y + b.h) return null; // parallel & outside
            } else {
                let t1 = (b.y - oy) / dy;
                let t2 = (b.y + b.h - oy) / dy;
                if (t1 > t2) [t1, t2] = [t2, t1];
                tEnter = Math.max(tEnter, t1);
                tExit = Math.min(tExit, t2);
            }

            if (tEnter > tExit) return null; // no overlap of slabs -> miss
            if (tExit < 0) return null;       // box is entirely behind the ray
            return tEnter >= 0 ? tEnter : 0;  // 0 => origin already inside box
        }

        // Cast the 8 sensor rays from the car center. Each reading is the
        // distance to the nearest block along that direction, capped at maxSight.
        // Stores both the numeric distances (car.sensors) and the hit points
        // (returned) so draw() can visualize the beams.
        function raycast() {
            const { maxSight } = car.consts;
            const ox = car.states.x;
            const oy = car.states.y;
            const distances = [];
            const endpoints = [];

            for (const dir of SENSOR_DIRS) {
                const ang = car.states.theta + Math.PI * 3 / 2 + dir.off;
                const dx = Math.cos(ang);
                const dy = Math.sin(ang);

                let best = maxSight;
                for (const b of blocks) {
                    const d = rayBox(ox, oy, dx, dy, b);
                    if (d !== null && d < best) best = d;
                }

                distances.push(best);
                endpoints.push([ox + dx * best, oy + dy * best, best < maxSight]);
            }

            car.sensors = distances;
            return endpoints;
        }

        // ---- Step 2 & 3 of physics2.md: SAT detection + min penetration axis --
        // Returns null if separated, else { normal, depth } with the normal
        // pointing OUT of the block toward the car.
        function collide(carCorners, carCenter, block) {
            const blockCorners = getBlockCorners(block);
            const c = Math.cos(car.states.theta);
            const sn = Math.sin(car.states.theta);
            // Candidate separating axes: the car's two edge normals and the
            // block's two edge normals. All are unit vectors, so the overlap
            // measured along them is the true penetration depth.
            const axes = [[c, sn], [-sn, c], [1, 0], [0, 1]];

            let minOverlap = Infinity;
            let bestAxis = null;

            for (const axis of axes) {
                const [minA, maxA] = project(carCorners, axis);
                const [minB, maxB] = project(blockCorners, axis);
                if (maxA < minB || maxB < minA) {
                    return null; // found a separating axis -> no collision
                }
                const overlap = Math.min(maxA, maxB) - Math.max(minA, minB);
                if (overlap < minOverlap) {
                    minOverlap = overlap;
                    bestAxis = axis;
                }
            }

            // Make the normal point from the block center toward the car center.
            const bcx = block.x + block.w / 2;
            const bcy = block.y + block.h / 2;
            let nx = bestAxis[0], ny = bestAxis[1];
            const dx = carCenter[0] - bcx;
            const dy = carCenter[1] - bcy;
            if (dx * nx + dy * ny < 0) { nx = -nx; ny = -ny; }

            return { normal: [nx, ny], depth: minOverlap };
        }

        // Resolve every collision for the current (already-advanced) car state.
        // A couple of iterations let the car settle when wedged against two boxes.
        function resolveCollisions() {
            let hitAny = false;
            for (let iter = 0; iter < 3; iter++) {
                let hitThisPass = false;
                for (const b of blocks) {
                    const corners = getCarCorners(car.states, car.consts.W);
                    const center = [car.states.x, car.states.y];
                    const hit = collide(corners, center, b);
                    if (!hit) continue;

                    hitThisPass = true;
                    hitAny = true;
                    const [nx, ny] = hit.normal;

                    // Step 3a: positional correction — push the car out of the
                    // box along the normal by the penetration depth. This is what
                    // actually enforces the wall against the wheel-driven motion.
                    car.states.x += nx * hit.depth;
                    car.states.y += ny * hit.depth;
                }
                if (!hitThisPass) break;
            }
            car.colliding = hitAny;
        }

        // ---- Step 1 of physics2.md: advance the car as if no obstacles --------
        function update() {
            const alpha1 = parseFloat(alpha1Input.value) || 0;
            const alpha2 = parseFloat(alpha2Input.value) || 0;

            // Integrate wheel angular accelerations into angular velocities.
            car.states.spin1 += alpha1 * dt;
            car.states.spin2 += alpha2 * dt;

            const { R, W } = car.consts;
            const s = car.states;

            // Kinematics from physics.md.
            s.omega = R * (s.spin1 - s.spin2) / W;
            s.theta = s.theta + s.omega * dt;

            const speed = R * (s.spin1 + s.spin2) / 2;
            s.vx = speed * Math.cos(s.theta + 3 * Math.PI / 2);
            s.vy = speed * Math.sin(s.theta + 3 * Math.PI / 2);

            // Predicted next position (no obstacles yet).
            s.x = s.x + s.vx * dt;
            s.y = s.y + s.vy * dt;

            // Step 2 & 3: detect and resolve against the boxes.
            resolveCollisions();

            // Measure distances to obstacles in 8 directions for this frame.
            raycast();
        }

        // ---- Rendering --------------------------------------------------------
        function draw(endpoints) {
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, 800, 800);

            ctx.fillStyle = 'gray';
            for (const b of blocks) ctx.fillRect(b.x, b.y, b.w, b.h);

            // sensor rays: drawn in red, ending at the detected obstacle or at
            // maxSight when nothing is in range. A marker dot flags real hits.
            for (let i = 0; i < endpoints.length; i++) {
                const [ex, ey, hit] = endpoints[i];
                ctx.strokeStyle = 'red';
                ctx.beginPath();
                ctx.moveTo(car.states.x, car.states.y);
                ctx.lineTo(ex, ey);
                ctx.stroke();
                if (hit) {
                    ctx.fillStyle = 'red';
                    ctx.fillRect(ex - 3, ey - 3, 6, 6);
                }
            }

            const { W, R } = car.consts;
            ctx.save();
            ctx.translate(car.states.x, car.states.y);
            ctx.rotate(car.states.theta);

            // body (front faces -y in local frame)
            ctx.fillStyle = car.colliding ? 'yellow' : 'red';
            ctx.fillRect(-W / 2, -W / 2, W, W);

            // wheels
            ctx.fillStyle = 'blue';
            ctx.fillRect(-W / 2 - R, -W / 2, R, W);  // left wheel
            ctx.fillStyle = 'green';
            ctx.fillRect(W / 2, -W / 2, R, W);       // right wheel

            ctx.restore();
        }

        function nextFrame() {
            const endpoints = raycast();   // sensor readings for the current state
            draw(endpoints);
            update();                      // advance, resolve, and re-measure
            readout.textContent = SENSOR_DIRS
                .map((d, i) => `${d.label.padEnd(2)}: ${car.sensors[i].toFixed(1)}`)
                .join('   ');
            requestAnimationFrame(nextFrame);
        }
        nextFrame();
    </script>
</body>
</html>
