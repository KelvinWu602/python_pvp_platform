<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <main>
        <h1>Received Keycloak Authorization Code</h1>
        <pre id="auth-code">Loading...</pre>

        <h1>Received Keycloak Tokens </h1>
        <label>access token</label> 
        <br>
        <pre id="access-token"> Loading...</pre>
        <br>
        <label>id token</label>
        <br>
        <pre id="id-token"> Loading...</pre>
        <br>
    </main>

    <button id="get-access-token"> Token Exchange </button>

    <script>
        const getAccessTokenBtn = document.getElementById('get-access-token');
        const accessTokenLabel = document.getElementById('access-token');
        const idTokenLabel = document.getElementById('id-token');
        const authCodeLabel = document.getElementById('auth-code');

        (function () {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            authCodeLabel.textContent = code !== null ? code : 'No "code" parameter in URL';
            sessionStorage.setItem('authorization-code', code);
        })();

        getAccessTokenBtn.addEventListener('click', function(){
            const auth_code = sessionStorage.getItem('authorization-code');
            fetch(`/access-token/${auth_code}`)
                .then((res)=>{
                    return res.json();
                }).then((json)=>{
                    accessTokenLabel.textContent = json.access_token;
                    idTokenLabel.textContent = json.id_token;

                    sessionStorage.setItem('access-token', json.access_token);
                    sessionStorage.setItem('id-token', json.id_token);
                });
            ;
        });
    </script>
</body>
</html>
