<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button type="button" id="kc-login">Login with Keycloak</button>
    <!-- Login -->
    <script>
        (function(){
            // Replace these placeholders with your Keycloak settings
            var keycloakBase = 'http://localhost:8080';
            var realm = 'python_pvp';
            var clientId = 'python_pvp';
            var redirectUri = window.location.origin + '/get-code'; // adjust if needed

// https://mykeycloakserver.com/realms/myrealm/protocol/openid-connect/auth?
// scope=openid&
// response_type=code&
// client_id=mycoolapp&
// redirect_uri=https://www.mycoolapp.com/auth_redirect

            var authUrl = keycloakBase + '/realms/' + encodeURIComponent(realm) +
                '/protocol/openid-connect/auth?scope=openid&client_id=' + encodeURIComponent(clientId) +
                '&redirect_uri=' + encodeURIComponent(redirectUri) +
                '&response_type=code';

            document.getElementById('kc-login').addEventListener('click', function(){
                window.location.href = authUrl;
            });
        })();
    </script>
</body>
</html>
